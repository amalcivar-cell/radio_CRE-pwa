<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio CRE Satelital</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1db954">
  
  <style>
    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --primary: #1db954;
      --text: #ffffff;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .player-card {
      background-color: var(--card-bg);
      padding: 2.5rem;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
      width: 280px;
    }

    .logo-container {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, var(--primary), #1aa34a);
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 8px 20px rgba(29, 185, 84, 0.3);
    }

    .logo-container svg {
      width: 50px;
      fill: white;
    }

    h1 {
      font-size: 1.5rem;
      margin: 0 0 0.5rem 0;
    }

    p {
      color: #b3b3b3;
      font-size: 0.9rem;
      margin: 0 0 2rem 0;
    }

    .btn-play {
      background-color: var(--primary);
      border: none;
      color: white;
      padding: 1rem 2.5rem;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, background-color 0.2s;
      width: 100%;
    }

    .btn-play:hover {
      background-color: #1ed760;
      transform: scale(1.03);
    }

    .btn-play:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class="player-card">
    <div class="logo-container">
      <!-- Icono de antena/radio en SVG -->
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L11 15v1c0 1.1.9 2 2 2v1.93zm5.9-5.07c-.09.38-.23.74-.4 1.08l-1.42-1.42c.42-.8.68-1.7.68-2.66 0-3.08-2.27-5.63-5.26-6.07l.11-.93C17.34 4.38 21 8.26 21 13c0 1.34-.33 2.59-.9 3.86z"/></svg>
    </div>
    
    <h1>Radio CRE Satelital</h1>
    <p id="status">Listo para reproducir</p>

    <!-- AQUÍ COLOCAS TU URL DE STREAMING -->
    <audio id="audioStream" src="https://radio.kapchosting.com/8120/stream"></audio>
    
    <button class="btn-play" id="playBtn">REPRODUCIR</button>
  </div>

  <script>
    const audio = document.getElementById('audioStream');
    const playBtn = document.getElementById('playBtn');
    const statusText = document.getElementById('status');

    // Lógica de reproducción/pausa
    playBtn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play()
          .then(() => {
            playBtn.textContent = 'PAUSAR';
            statusText.textContent = 'Transmitiendo en vivo...';
          })
          .catch(err => {
            statusText.textContent = 'Error al cargar el origen.';
            console.error("Error de streaming:", err);
          });
      } else {
        audio.pause();
        playBtn.textContent = 'REPRODUCIR';
        statusText.textContent = 'Audio pausado';
      }
    });

    // REGISTRO DEL SERVICE WORKER (Clave para que sea PWA)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registrado con éxito', reg.scope))
          .catch(err => console.error('Error al registrar Service Worker', err));
      });
    }
  </script>
</body>
</html>
