<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRE Satelital en Vivo</title>
  <link rel="manifest" href="manifest.json">
  <!-- Color de la barra de estado móvil con el amarillo oficial -->
  <meta name="theme-color" content="#FAD107">
  <!-- Compatibilidad barra transparente para iPhone -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <style>
    :root {
      --bg-color: #001A57;       /* Azul oficial de CRE Satelital */
      --card-bg: #FFFFFF;        /* Tarjeta blanca para resaltar el reproductor */
      --primary: #FAD107;        /* Amarillo vibrante para los botones */
      --text-dark: #001A57;      /* Texto azul oscuro */
      --text-light: #666666;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background-image: url("fondo.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      /* background-color: var(--bg-color); */ /* Fallback si la imagen no carga */
      /* color: var(--text-dark); */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .player-card {
      background-color: var(--card-bg);
      padding: 2.5rem;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      text-align: center;
      width: 280px;
    }

    .logo-radio {
      width: 140px;
      height: 140px;
      object-fit: contain;
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      display: block;
    }

      h1 {
      font-size: 1.6rem;
      font-weight: 800;
      margin: 0 0 0.4rem 0;
      color: var(--text-dark);
    }

    p {
      color: var(--text-light);
      font-size: 0.95rem;
      margin: 0 0 2rem 0;
    }

    .btn-play {
      background-color: var(--primary);
      border: none;
      color: var(--text-dark); /* Texto oscuro sobre botón amarillo para mejor legibilidad */
      padding: 1.1rem 2.5rem;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 1px;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
      width: 100%;
      box-shadow: 0 5px 15px rgba(250, 209, 7, 0.3);
    }

    .btn-play:hover {
      background-color: #ffd71a;
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(250, 209, 7, 0.5);
    }

    .btn-play:active {
      transform: scale(0.98);
    }

    .landing-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: var(--text-dark);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none; /* Quita el subrayado feo por defecto */
      transition: color 0.2s, transform 0.2s;
      opacity: 0.8;
    }

    .landing-link:hover {
     opacity: 1;
     transform: translateY(-1px); /* Pequeño efecto de elevación al pasar el mouse */
     text-decoration: underline;  /* El subrayado solo aparece elegantemente al pasar el cursor */
    }

    .social-row a.whatsapp-icon svg {
    fill: #25D366; /* Color verde tradicional de WhatsApp al pasar el mouse */
    width: 24px;
    height: 24px;
    }

    .social-row a.whatsapp-icon {
      display: flex;
      align-items: center;
    }

  </style>
</head>
<body>

  <div class="player-card">
    <!-- Muestra el archivo de imagen que subiste a tu GitHub -->
    <img class="logo-radio" src="icono.png" alt="Logo CRE Satelital">
    
    <h1>CRE Satelital</h1>
    <p id="status">Listo para conectar</p>

    <!-- Tu origen de URL de streaming -->
    <audio id="audioStream" src="https://radio.kapchosting.com/8120/stream"></audio>
    
    <button class="btn-play" id="playBtn">ESCUCHAR EN VIVO</button>
    
    <!-- NUEVO: Enlace a tu página web o Landing Page -->
    <a href="https://radiocresatelital.com" target="_blank" rel="noopener" class="landing-link">
      Visita nuestra página web      
    </a>
   <div class="social-row">
    <!-- NUEVO: Icono de WhatsApp para contacto directo -->
    <a href="https://wa.me/593984530315" target="_blank" rel="noopener" aria-label="WhatsApp" class="whatsapp-icon">
      <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.5-5.739-1.446L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.42 9.864-9.858.002-2.634-1.023-5.11-2.885-6.974-1.862-1.864-4.343-2.89-6.979-2.891-5.439 0-9.865 4.421-9.869 9.86-.001 1.636.429 3.233 1.246 4.642l-.993 3.634 3.72-.975zm11.083-4.526c-.302-.151-1.787-.882-2.055-.98-.267-.099-.463-.149-.658.152-.196.3-.755.952-.927 1.15-.171.2-.343.226-.645.075-.3-.15-1.266-.466-2.413-1.493-.892-.795-1.494-1.778-1.669-2.079-.175-.302-.019-.465.132-.614.136-.134.302-.352.453-.529.151-.176.201-.293.302-.49.101-.197.05-.37-.025-.521-.075-.152-.658-1.585-.902-2.172-.237-.571-.48-.493-.658-.502-.171-.008-.367-.01-.563-.01-.196 0-.515.074-.784.37-.27.296-1.031 1.008-1.031 2.458 0 1.45.105 2.854.252 3.051.147.197 2.068 3.159 5.011 4.434.7.303 1.246.484 1.671.619.704.224 1.344.193 1.85.118.563-.084 1.787-.73 2.039-1.436.252-.706.252-1.312.176-1.436-.075-.124-.271-.197-.573-.348z"/></svg>
    </a>
  </div>       
  </div>
  
   <script>
    const audio = document.getElementById('audioStream');
    const playBtn = document.getElementById('playBtn');
    const statusText = document.getElementById('status');

    // Configuración para que el celular reconozca el audio en segundo plano y pantalla de bloqueo
    function updateMediaSession() {
      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: 'CRE Satelital',
          artist: 'En Vivo',
          album: 'Radio PWA',
          artwork: [
            { src: 'icono.png', sizes: '512x512', type: 'image/png' }
          ]
        });

        // Controles nativos desde la barra de notificaciones del celular
        navigator.mediaSession.setActionHandler('play', () => togglePlay());
        navigator.mediaSession.setActionHandler('pause', () => togglePlay());
      }
    }

    function togglePlay() {
      if (audio.paused) {
        statusText.textContent = 'Conectando señal...';
        audio.play()
          .then(() => {
            playBtn.textContent = 'PAUSAR';
            statusText.textContent = 'Transmitiendo en vivo...';
            updateMediaSession();
          })
          .catch(err => {
            statusText.textContent = 'Error al conectar la señal.';
            console.error("Error de reproducción:", err);
          });
      } else {
        audio.pause();
        playBtn.textContent = 'ESCUCHAR EN VIVO';
        statusText.textContent = 'Transmisión pausada';
      }
    }

    // Evento al hacer clic en el botón principal
    playBtn.addEventListener('click', togglePlay);

    // REGISTRO DEL SERVICE WORKER
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker activo:', reg.scope))
          .catch(err => console.error('Error de registro del SW:', err));
      });
    }
  </script>
</body>
</html>
